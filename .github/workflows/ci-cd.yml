name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['master']

jobs:
  # ── JOB 1: Unit tests (Jest) ──────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── JOB 2a: Deploy PR preview (staging) ──────────────────────────
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  # ── JOB 2b: Deploy to production (master only) ───────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          keep_files: true

  # ── JOB 3a: Integration tests against PR preview ─────────────────
  integration-test-preview:
    name: Integration Tests (Preview)
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Wait for GitHub Pages to serve preview
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-${{ github.event.pull_request.number }}/"
          echo "Waiting for $PREVIEW_URL ..."
          npx wait-on "$PREVIEW_URL" -t 120000
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV

      - name: Run Cypress against preview URL
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ env.PREVIEW_URL }}

      - name: Comment PR with preview URL (tests passed!)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const url = `https://${owner}.github.io/${repo}/preview/pr-${prNumber}/`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('preview/pr-')
            );

            const statusEmoji = '✅';
            const body = `${statusEmoji} **All checks passed!**\n\n🔗 [Preview deployment](${url})\n🟢 Production: https://${owner}.github.io/${repo}/\n\n> Integration tests ran against this preview URL and passed.`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body,
              });
            }

  # ── JOB 3b: Integration tests against production ─────────────────
  integration-test:
    name: Integration Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Wait for GitHub Pages to serve production
        run: |
          PROD_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Waiting for $PROD_URL ..."
          npx wait-on "$PROD_URL" -t 120000

      - name: Run Cypress against production URL
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
