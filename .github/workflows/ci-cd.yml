name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['master']

jobs:
  # ── JOB 1: Unit tests (Jest) ──────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── JOB 2: Integration tests (Cypress) ────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: npx serve src -l 8080 &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080

      - name: Run Cypress integration tests
        run: npx cypress run

  # ── JOB 3a: Deploy PR preview (staging) ──────────────────────────
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const url = `https://${owner}.github.io/${repo}/preview/pr-${prNumber}/`;

            // Check if we already commented a preview URL on this PR
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('preview/pr-')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body: `🚀 **Preview updated!**\n\n🔗 ${url}\n\n> This is a staging deployment. The production site is at https://${owner}.github.io/${repo}/`,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `🚀 **Preview deployed!**\n\n🔗 ${url}\n\n> This is a staging deployment. The production site is at https://${owner}.github.io/${repo}/`,
              });
            }

  # ── JOB 3b: Deploy to production (master only) ───────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          keep_files: true
