<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Counter — CI/CD Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Click Counter</h1>
    <p>You've clicked the button</p>
    <p class="count-display"><span id="counter-value">0</span> times</p>
    <button id="increment-btn">Click me!</button>
    <p class="hint">Open the browser console and run <code>incrementCounter(5)</code> to test the pure function.</p>
  </main>
  <script src="counter.js"></script>
</body>
</html>
